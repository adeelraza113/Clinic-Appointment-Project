{% extends 'layout_base.html' %}
{% block main_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center"><h5>Secure Access Portal</h5></div>
            <div class="card-body">
                {% if messages %}{% for m in messages %}<div class="alert alert-danger">{{m}}</div>{% endfor %}{% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><label>Username</label><input type="text" name="input_user" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="input_pass" class="form-control" required></div>
                    <button type="submit" class="btn btn-dark w-100">Authenticate</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
