{% extends 'layout_base.html' %}

{% block main_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Add New Patient Record</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="client_name" class="form-control" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age (Years)</label>
                        <input type="number" name="client_age" class="form-control" placeholder="Enter age" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <select name="client_gender" class="form-select" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Phone</label>
                        <input type="text" name="client_phone" class="form-control" placeholder="Primary contact number" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Medical History / Notes</label>
                        <textarea name="client_notes" class="form-control" rows="3" placeholder="Optional clinical description..."></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Save Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
