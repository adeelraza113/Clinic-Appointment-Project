{% extends 'layout_base.html' %}
{% block main_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Active Checkup Terminal</h5>
                <span class="badge bg-primary">ID: #SLT-{{ booking.id }}</span>
            </div>
            <div class="card-body p-4">
                <!-- Patient Context Briefing -->
                <div class="bg-light p-3 rounded mb-4 border-start border-3 border-dark">
                    <div class="row">
                        <div class="col-md-6">
                            <small class="text-muted d-block text-uppercase fw-bold small">Patient Name</small>
                            <span class="fs-5 fw-medium text-dark">{{ patient.patient_name }}</span>
                        </div>
                        <div class="col-md-6 text-md-end mt-2 mt-md-0">
                            <small class="text-muted d-block text-uppercase fw-bold small">Scheduled Session</small>
                            <span class="text-secondary fw-bold">{{ booking.schedule_date }}</span>
                        </div>
                    </div>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <!-- Clinical Notes System -->
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Clinical Observations / Diagnosis</label>
                        <textarea name="clinical_notes" class="form-control" rows="4" placeholder="Type baseline symptoms, vital status logs, and clinical observations..." required></textarea>
                    </div>

                    <!-- Medication Matrix System -->
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">E-Prescription & Medication Plan</label>
                        <textarea name="medication_plan" class="form-control" rows="4" placeholder="e.g., Tab. Panadol 500mg — 1-0-1 (After Meals) for 5 Days" required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'dashboard_url' %}" class="btn btn-light border flex-fill">Cancel Session</a>
                        <button type="submit" class="btn btn-dark flex-fill fw-medium">Finalize Treatment & Close File</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
