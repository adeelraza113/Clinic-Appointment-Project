<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System</title>
    <!-- Simple CDN for styling without cluttering folder -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">CareClinic Engine</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'dashboard_url' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'create_patient_url' %}">Register Patient</a>
                <a class="nav-link" href="{% url 'book_slot_url' %}">Schedule Slot</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block main_content %}
        <!-- Dynamic content will load here -->
        {% endblock %}
    </div>
</body>
</html>
