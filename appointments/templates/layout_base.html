<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System</title>
    <!-- Simple CDN for styling without cluttering folder -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">CareClinic Engine</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                <span class="nav-link text-info me-2">Logged in as: {{ user.username }}</span>
                <a class="nav-link" href="{% url 'dashboard_url' %}">Dashboard</a>
                {% if is_staff %}
                <!-- Staff Links -->
                <a class="nav-link" href="{% url 'create_patient_url' %}">Admin Registration</a>
                {% endif %}
                <a class="nav-link" href="{% url 'book_slot_url' %}">Schedule Appointment</a>
                <a class="nav-link btn btn-sm btn-danger text-white px-2 ms-2" href="{% url 'logout_url' %}">Logout</a>
                {% else %}
                <a class="nav-link" href="{% url 'login_url' %}">Sign In</a>
                <a class="nav-link btn btn-sm btn-primary text-white px-2 ms-2" href="{% url 'signup_url' %}">Create
                    Account</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block main_content %}
        <!-- Dynamic content will load here -->
        {% endblock %}
    </div>
</body>

</html>
