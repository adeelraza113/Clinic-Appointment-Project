{% extends 'layout_base.html' %}

{% block main_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Book Appointment Slot</h5>
            </div>
            {% if messages %}
            <div class="row">
                <div class="col-12">
                    {% for msg in messages %}
                    <div class="alert {% if msg.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show"
                        role="alert">
                        <strong>System Notification:</strong> {{ msg }}
                        <button type="button" class="btn-close" data-bs-auto="close" data-bs-dismiss="alert"
                            aria-label="Close"></button>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <!-- Patient Selection Dropdown -->
                    <div class="mb-3">
                        <label class="form-label">Select Registered Patient</label>
                        {% if is_staff %}
                        <select name="pat_selection" class="form-select" required>
                            <option value="">-- Choose Patient --</option>
                            {% for p in patients %}
                            <option value="{{ p.id }}">{{ p.full_name }}</option>
                            {% endfor %}
                        </select>
                        {% else %}
                        <!-- Normal user is auto-locked into their profile -->
                        {% for p in patients %}
                        <input type="text" class="form-control" value="{{ p.full_name }}" readonly>
                        <input type="hidden" name="pat_selection" value="{{ p.id }}">
                        {% endfor %}
                        {% endif %}
                    </div>
                    <!-- Doctor Selection Dropdown -->
                    <div class="mb-3">
                        <label class="form-label">Select Medical Specialist</label>
                        <select name="doc_selection" class="form-select" required>
                            <option value="">-- Choose Doctor --</option>
                            {% for d in specialists %}
                            <option value="{{ d.id }}">Dr. {{ d.expert_name }} ({{ d.field_of_expertise }}) — Fee: {{
                                d.consultation_fee }} PKR</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Date Picker -->
                    <div class="mb-3">
                        <label class="form-label">Appointment Date</label>
                        <input type="date" name="booking_date" class="form-control" required>
                    </div>

                    <!-- Time Picker -->
                    <div class="mb-3">
                        <label class="form-label">Preferred Time</label>
                        <input type="time" name="booking_time" class="form-control" required>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Confirm Consultation</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
